{% extends 'base.html' %}
{% block content %}
  <h2>Checkout</h2>
  <form method="post">
    <div class="mb-3">
      <label class="form-label">Full Name</label>
      <input class="form-control" name="name" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Address</label>
      <input class="form-control" name="address" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Payment (mock)</label>
      <input class="form-control" name="card" required>
    </div>
    <button class="btn btn-success">Place order (mock)</button>
  </form>
{% endblock %}
