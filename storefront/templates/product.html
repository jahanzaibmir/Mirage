{% extends 'base.html' %}
{% block content %}
  <div class="row">
    <div class="col-md-8">
      <h2>{{ product.name }}</h2>
      <p class="text-muted">{{ product.description }}</p>
      <h3 class="text-primary">${{ '%.2f'|format(product.price) }}</h3>
      <p>Stock: {{ product.stock }}</p>
      <a href="/cart/add/{{ product.id }}" class="btn btn-success">Add to cart</a>
    </div>
    <div class="col-md-4">
      <div class="card p-3">
        <h6>Specs</h6>
        <ul>
          <li>High-quality components</li>
          <li>Secure shipping</li>
        </ul>
      </div>
    </div>
  </div>
{% endblock %}
