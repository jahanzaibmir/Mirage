{% extends 'base.html' %}
{% block content %}
  <div class="row">
    <div class="col-md-9">
      <h1>Featured Components</h1>
      <div class="row">
        {% for p in products %}
        <div class="col-md-6 col-lg-4 mb-4">
          <div class="card h-100 shadow-sm">
            <div class="card-body d-flex flex-column">
              <h5 class="card-title">{{ p.name }}</h5>
              <p class="card-text">{{ p.description }}</p>
              <div class="mt-auto d-flex justify-content-between align-items-center">
                <strong class="text-primary">${{ '%.2f'|format(p.price) }}</strong>
                <a class="btn btn-outline-primary btn-sm" href="/product/{{p.id}}">View</a>
              </div>
            </div>
          </div>
        </div>
        {% endfor %}
      </div>
    </div>
    <aside class="col-md-3">
      <div class="card p-3 mb-3">
        <h6>Why buy from us?</h6>
        <p class="small">Professional-grade components, verified sellers, secure checkout.</p>
      </div>
    </aside>
  </div>
{% endblock %}
